name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  # Run a full release on demand from the Actions tab — no tag needed. Give it a
  # version like v0.2.1; the run builds every artifact and publishes that release.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release version to publish (e.g. v0.2.1)'
        required: true
        type: string

jobs:
  build:
    # 22.04 is not just "an LTS": it is the glibc floor (2.35) the project ships
    # against, so the AppImage produced here runs on Ubuntu 22.04 / Mint 21 and
    # everything newer. Building on ubuntu-latest would silently raise that floor.
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-base-dev-tools qt6-webengine-dev qt6-webengine-dev-tools libgl1-mesa-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DODV_BUILD_ADE=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        # The GUI binary is built but never shown; the suite is headless. offscreen
        # keeps any stray QWidget construction from needing an X server.
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

  # The CLI has to keep building with no GUI toolchain at all — headless servers
  # install it that way, and a stray Qt6::Widgets include in core/ would break
  # them without this job noticing.
  cli-only:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (no Widgets consumer)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build qt6-base-dev qt6-base-dev-tools

      - name: Configure + build CLI only
        run: |
          cmake -S . -B build-cli -G Ninja -DCMAKE_BUILD_TYPE=Release -DODV_BUILD_ADE=OFF
          cmake --build build-cli -j"$(nproc)"

      - name: Smoke
        run: ./build-cli/cli/ollamadev --version

  appimage:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake qt6-base-dev qt6-base-dev-tools qt6-webengine-dev qt6-webengine-dev-tools \
            libgl1-mesa-dev libxkbcommon-x11-0 xvfb file desktop-file-utils squashfs-tools

      - name: Build AppImage
        run: scripts/build-appimage.sh

      - name: Verify the AppImage actually starts
        run: |
          APP=dist/OllamaDev-x86_64.AppImage
          # No FUSE on GitHub runners, hence extract-and-run.
          "$APP" --appimage-extract-and-run --cli --version

          # Launch the GUI headless and stop it by the pid we started, never a
          # `pkill -f ollamadev-ade` — a kill by name is the exact bug this port
          # exists to avoid (it would also shoot down a concurrent job's app).
          xvfb-run -a "$APP" --appimage-extract-and-run &
          APP_PID=$!
          sleep 8
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "✓ desktop app is alive under xvfb"
          else
            echo "✗ desktop app exited on startup"; exit 1
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: OllamaDev-x86_64.AppImage
          path: dist/OllamaDev-x86_64.AppImage

  release:
    # Runs on a tag push OR a manual dispatch — and only once every job above is
    # green, so a release artifact that never passed the suite is impossible.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build, cli-only, appimage]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake qt6-base-dev qt6-base-dev-tools qt6-webengine-dev qt6-webengine-dev-tools \
            libgl1-mesa-dev libxkbcommon-x11-0 xvfb file desktop-file-utils squashfs-tools

      - name: Build artifacts
        run: |
          sudo apt-get install -y --no-install-recommends rpm
          scripts/build-appimage.sh
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)"
          (cd build && cpack -G "TGZ;DEB;RPM")

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Built on ubuntu-22.04 so the glibc floor is 2.35. Building this on
          # ubuntu-latest would silently raise the floor and the AppImage would
          # refuse to start on Mint 21 — with no warning until a user reports it.
          #
          # TAG comes from the pushed tag, or the dispatch input on a manual run.
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_REF_NAME}"
          # A manual dispatch has no tag object yet — point one at this commit so
          # the release has something to hang on, and re-publish (clobber) if the
          # release already exists.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          git tag -f "$TAG" && git push -f origin "$TAG"
          gh release create "$TAG" \
            --title "OllamaDev-Qt $TAG" \
            --latest \
            --notes-file RELEASE_NOTES.md \
            dist/OllamaDev-x86_64.AppImage \
            build/ollamadev-*.tar.gz \
            build/ollamadev-*.deb \
            build/ollamadev-*.rpm
