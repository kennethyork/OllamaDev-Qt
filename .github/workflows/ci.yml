name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  # Run a full release on demand from the Actions tab — no tag needed. Give it a
  # version like v0.2.1; the run builds every artifact and publishes that release.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release version to publish (e.g. v0.2.1)'
        required: true
        type: string

# One run per ref at a time: a newer push to main cancels an older in-flight run,
# so releases don't pile up or two runs race to publish the same version.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # 22.04 is not just "an LTS": it is the glibc floor (2.35) the project ships
    # against, so the AppImage produced here runs on Ubuntu 24.04 / Mint 22 and
    # everything newer. Building on ubuntu-latest would silently raise that floor.
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-base-dev-tools qt6-webengine-dev qt6-webengine-dev-tools qt6-declarative-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DODV_BUILD_ADE=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        # The GUI binary is built but never shown; the suite is headless. offscreen
        # keeps any stray QWidget construction from needing an X server.
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

  # The CLI has to keep building with no GUI toolchain at all — headless servers
  # install it that way, and a stray Qt6::Widgets include in core/ would break
  # them without this job noticing.
  cli-only:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (no Widgets consumer)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build qt6-base-dev qt6-base-dev-tools

      - name: Configure + build CLI only
        run: |
          cmake -S . -B build-cli -G Ninja -DCMAKE_BUILD_TYPE=Release -DODV_BUILD_ADE=OFF
          cmake --build build-cli -j"$(nproc)"

      - name: Smoke
        run: ./build-cli/cli/ollamadev --version

  appimage:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake qt6-base-dev qt6-base-dev-tools qt6-webengine-dev qt6-webengine-dev-tools qt6-declarative-dev \
            libgl1-mesa-dev libxkbcommon-x11-0 xvfb file desktop-file-utils squashfs-tools

      - name: Build AppImage
        run: scripts/build-appimage.sh

      - name: Verify the AppImage actually starts
        run: |
          APP=dist/OllamaDev-x86_64.AppImage
          # No FUSE on GitHub runners, hence extract-and-run.
          "$APP" --appimage-extract-and-run --cli --version

          # Launch the GUI headless and stop it by the pid we started, never a
          # `pkill -f ollamadev-ade` — a kill by name is the exact bug this port
          # exists to avoid (it would also shoot down a concurrent job's app).
          xvfb-run -a "$APP" --appimage-extract-and-run &
          APP_PID=$!
          sleep 8
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "✓ desktop app is alive under xvfb"
          else
            echo "✗ desktop app exited on startup"; exit 1
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: OllamaDev-x86_64.AppImage
          path: dist/OllamaDev-x86_64.AppImage

  release:
    # Runs on EVERY push to main, plus tags and manual dispatch — and only once
    # every job above is green, so a release that never passed the suite is
    # impossible. A push to main publishes/updates the release for the version in
    # core/Version.h; a tag or dispatch publishes that exact version. Never skips
    # on a push. (Pull requests still don't release — only main pushes do.)
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    needs: [build, cli-only, appimage]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      # fetch-depth 0 + tags so we can see the latest released version to bump from.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags --force >/dev/null 2>&1 || true
          # A tag push or a manual dispatch publishes that EXACT version. A plain
          # push to main AUTO-INCREMENTS: patch+1 over the latest released version
          # of this major.minor, or the base version in Version.h when the
          # major.minor changed (a Version.h bump starts a fresh minor).
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then TAG="${GITHUB_REF_NAME}"; fi
          if [ -z "$TAG" ]; then
            BASE="$(sed -n 's/.*ODV_VERSION "\([0-9.]*\)".*/\1/p' core/Version.h)"
            BMM="${BASE%.*}"                       # base major.minor, e.g. 0.2
            LATEST="$(git tag -l "v${BMM}.*" --sort=-v:refname | head -1)"
            if [ -n "$LATEST" ]; then
              p="${LATEST##*.}"; TAG="v${BMM}.$((p + 1))"   # patch + 1
            else
              TAG="v${BASE}"                       # first release of this minor
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "num=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "▸ releasing $TAG"

      - name: Install Qt6 + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake qt6-base-dev qt6-base-dev-tools qt6-webengine-dev qt6-webengine-dev-tools qt6-declarative-dev \
            libgl1-mesa-dev libxkbcommon-x11-0 xvfb file desktop-file-utils squashfs-tools rpm

      - name: Build artifacts
        env:
          ODV_RELEASE_VERSION: ${{ steps.ver.outputs.num }}
        run: |
          scripts/build-appimage.sh
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DODV_RELEASE_VERSION="$ODV_RELEASE_VERSION"
          cmake --build build -j"$(nproc)"
          (cd build && cpack -G "TGZ;DEB;RPM")

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          # Every push cuts a NEW version, so the tag is unique and there is no
          # delete/clobber race. Create it at this commit; the || branch just
          # re-uploads if a retry finds it already there.
          ASSETS=(dist/OllamaDev-x86_64.AppImage build/ollamadev-*.tar.gz \
                  build/ollamadev-*.deb build/ollamadev-*.rpm)
          gh release create "$TAG" --target "$GITHUB_SHA" \
            --title "OllamaDev-Qt $TAG" --latest \
            --notes-file RELEASE_NOTES.md "${ASSETS[@]}" \
            || gh release upload "$TAG" "${ASSETS[@]}" --clobber
